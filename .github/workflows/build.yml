name: Build

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FitAssistant.slnx

      - name: Build
        run: dotnet build FitAssistant.slnx --configuration Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/FitAssistant.Frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/FitAssistant.Frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
