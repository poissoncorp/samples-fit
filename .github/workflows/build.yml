name: Build

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FitAssistant.slnx

      - name: Build
        run: dotnet build FitAssistant.slnx --configuration Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/FitAssistant.Frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/FitAssistant.Frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: backend
    env:
      Parameters__openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      Parameters__ravendb-license: ${{ secrets.RAVEN_LICENSE }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FitAssistant.slnx

      - name: Run integration tests
        run: dotnet test tests/FitAssistant.Tests.Integration/FitAssistant.Tests.Integration.csproj --configuration Release --no-restore --logger "console;verbosity=normal"

  aspire-smoke:
    runs-on: ubuntu-latest
    needs: backend
    env:
      Parameters__openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      Parameters__ravendb-license: ${{ secrets.RAVEN_LICENSE }}
      ASPIRE_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/FitAssistant.Frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/FitAssistant.Frontend
        run: npm ci

      - name: Install Aspire CLI
        run: dotnet tool install -g Aspire.Cli

      - name: aspire run + readiness probe
        run: |
          set -e
          aspire run > apphost.log 2>&1 &
          APID=$!
          trap 'kill -TERM $APID 2>/dev/null || true' EXIT
          # 15 min: cold runner has to pull ravendb-nightly + rabbit + minio
          # and build the backend image from scratch.
          for i in $(seq 1 90); do
            # Docker may emit either 0.0.0.0:NNN->8080/tcp or [::]:NNN->8080/tcp.
            port=$(docker ps --format "{{.Ports}}" 2>/dev/null | grep -oE "(0\.0\.0\.0|\[::\]):[0-9]+->8080/tcp" | head -1 | grep -oE ":[0-9]+->" | grep -oE "[0-9]+")
            if [ -n "$port" ] && curl -sf "http://localhost:$port/api/ready" > /dev/null 2>&1; then
              echo "READY on host port $port after $((i * 10))s"
              exit 0
            fi
            if [ $((i % 6)) -eq 1 ]; then
              echo "--- t=$((i * 10))s docker ps ---"
              docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || true
            fi
            sleep 10
          done
          echo "::error::Stack did not become ready within 15 minutes"
          echo "--- final docker ps ---"
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || true
          echo "--- apphost.log tail ---"
          tail -200 apphost.log
          exit 1

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diagnostics/containers
          for name in $(docker ps -a --format '{{.Names}}' 2>/dev/null); do
            docker logs "$name" > "diagnostics/containers/$name.log" 2>&1 || true
          done
          if [ -d ~/.aspire/logs ]; then
            cp -r ~/.aspire/logs diagnostics/aspire-logs || true
          fi
          ls -la diagnostics/ diagnostics/containers/ 2>/dev/null || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aspire-smoke-diagnostics
          path: |
            apphost.log
            diagnostics/
